name: Production pipeline

on:
  push:
    branches:
      - main

jobs:
  verify-and-connect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workflow information
        run: |
          echo "The workflow was triggered successfully."
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"

      - name: Configure SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH connection
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            "$VM_USER@$VM_HOST" \
            '
              echo "SSH connection succeeded."
              echo "Remote user:"
              whoami
              echo "Remote hostname:"
              hostname
              echo "Remote working directory:"
              pwd
            '